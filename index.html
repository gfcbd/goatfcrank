<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #020617;
  color: white;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(2,6,23,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  z-index: 1000;
}

.header img {
  height: 32px;
  transition: 0.3s;
}

.header img:hover {
  transform: rotate(8deg) scale(1.1);
}

.header h1 {
  font-size: 20px;
  margin: 0;
  background: linear-gradient(90deg, #22c55e, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 3s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 2px #22c55e); }
  to { filter: drop-shadow(0 0 8px #38bdf8); }
}

/* MAIN */
.main {
  width: 100%;
  height: calc(100vh - 100px);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 95%;
  max-width: 500px;
  background: rgba(15,23,42,0.7);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.footer a {
  text-decoration: none;
  color: #cbd5f5;
  font-size: 11px;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: 0.3s;
}

.footer i {
  font-size: 18px;
  margin-bottom: 2px;
  transition: 0.3s;
}

/* HOVER EFFECT */
.footer a:hover {
  color: #38bdf8;
  transform: translateY(-3px);
}

.footer a:hover i {
  transform: scale(1.2);
  text-shadow: 0 0 10px #38bdf8;
}

/* ACTIVE CLICK */
.footer a:active {
  transform: scale(0.9);
}

/* MOBILE FIX */
@media (max-width: 500px) {
  .header h1 {
    font-size: 18px;
  }
  .header img {
    height: 28px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://i.imgur.com/LY3Bb9m.png">
  <h1>GOAT FC</h1>
</div>

<!-- MAIN -->
<div class="main">
  <iframe id="mainFrame"></iframe>
</div>

<!-- FOOTER -->
<div class="footer">
  <a id="home"><i class="fas fa-home"></i>Home</a>
  <a id="register"><i class="fas fa-user-plus"></i>Register</a>
  <a id="score"><i class="fas fa-trophy"></i>Score</a>
  <a id="submit"><i class="fas fa-paper-plane"></i>Submit</a>
</div>

<script>

// GOOGLE SHEET LINK
const sheetURL = "https://opensheet.elk.sh/1ZoXNHa5sYiP_HaPRyL5RDML7l3kC2IaGuQCAmYkERf8/CONFIG";

fetch(sheetURL)
.then(res => res.json())
.then(data => {

  let config = {};
  data.forEach(row => {
    config[row.key] = row.value;
  });

  // MAIN FRAME
  document.getElementById("mainFrame").src = config.main_link;

  // FOOTER LINKS
  document.getElementById("home").href = config.home_link;
  document.getElementById("register").href = config.register_link;
  document.getElementById("score").href = config.score_link;
  document.getElementById("submit").href = config.submit_link;

})
.catch(err => console.error(err));

</script>

</body>
</html>
