<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* ===== NAVBAR ===== */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:rgba(15,23,42,0.8);
backdrop-filter:blur(10px);
flex-wrap:wrap;
}

.nav-links a{
margin:8px;
color:#cbd5f5;
text-decoration:none;
transition:.3s;
}

.nav-links a:hover{
color:#a78bfa;
text-shadow:0 0 10px #a78bfa;
}

/* ===== LOGO ===== */
.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:700;
color:white;
}

.logo img{
height:45px;
filter:drop-shadow(0 0 10px #7c3aed);
}

/* ===== HERO ADS ===== */
.hero{
position:relative;
width:100%;
height:300px;
overflow:hidden;
}

.ad-box{
position:absolute;
width:100%;
height:100%;
display:none;
}

.ad-box.active{display:block;}

.ad-box img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.5);
}

/* OVERLAY */
.ad-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.glow{
text-shadow:0 0 10px #8b5cf6,0 0 30px #7c3aed;
}

.btn{
margin-top:10px;
padding:10px 25px;
background:linear-gradient(45deg,#7c3aed,#ec4899);
border-radius:30px;
text-decoration:none;
color:white;
}

/* ===== QUICK ===== */
.section{
text-align:center;
padding:30px 10px;
}

.quick-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
}

.quick-box{
width:160px;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.quick-box:hover{
transform:scale(1.05);
box-shadow:0 0 20px #8b5cf6;
}

/* ===== CHAMPIONS ===== */
.champ-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.champ{
width:160px;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:15px;
transition:.3s;
}

.champ:hover{
transform:scale(1.05);
box-shadow:0 0 20px #ec4899;
}

.champ img{
width:100%;
border-radius:10px;
}

/* ===== DESCRIPTION ===== */
.desc{
max-width:700px;
margin:20px auto;
color:#cbd5f5;
font-size:14px;
}

/* ===== SOCIAL ===== */
.social{
text-align:center;
padding:30px;
}

.social a{
display:inline-block;
margin:5px;
padding:10px 15px;
background:#0ea5e9;
border-radius:8px;
text-decoration:none;
color:white;
}

/* ===== MOBILE ===== */
@media(max-width:600px){
.hero{height:220px;}
.logo span{font-size:18px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="logo">
<img src="https://i.imgur.com/LY3Bb9m.png">
<span class="glow">GOAT FC</span>
</div>

<div class="nav-links">
<a href="#" id="rules">Rules</a>
<a href="#" id="about">About Us</a>
<a href="#" id="contact">Contact</a>
<a href="#" id="login">Login</a>
</div>

</div>

<!-- ADS -->
<div class="hero"></div>

<!-- QUICK LINKS -->
<div class="section">
<h2 class="glow">CLUB • ELITE • TOURNAMENT</h2>
<div class="quick-container"></div>
</div>

<!-- CHAMPIONS -->
<div class="section">
<h2 class="glow">CHAMPIONS</h2>
<div class="champ-container"></div>

<div class="desc">
🏆 These champions are not just winners — they are the pride of Goat FC.  
Each victory tells a story of dedication, skill, and dominance.  
Rise, compete, and etch your name among legends.
</div>

</div>

<!-- SOCIAL -->
<div class="social">
<h2 class="glow">JOIN COMMUNITY</h2>
</div>

<script>

const sheetID = "1ZoXNHa5sYiP_HaPRyL5RDML7l3kC2IaGuQCAmYkERf8";

/* ===== ADS ===== */
fetch(`https://opensheet.elk.sh/${sheetID}/ADS`)
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach((ad,i)=>{
html+=`
<div class="ad-box ${i==0?'active':''}">
<img src="${ad.image}">
<div class="ad-content">
<h1 class="glow">${ad.title}</h1>
<p>${ad.desc}</p>
<a href="${ad.link}" class="btn">${ad.button}</a>
</div>
</div>`;
});
document.querySelector(".hero").innerHTML=html;
startSlider();
});

function startSlider(){
let ads=document.querySelectorAll(".ad-box");
let i=0;
setInterval(()=>{
ads[i].classList.remove("active");
i=(i+1)%ads.length;
ads[i].classList.add("active");
},4000);
}

/* ===== LINKS ===== */
fetch(`https://opensheet.elk.sh/${sheetID}/LINKS`)
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(l=>{
html+=`
<div class="quick-box" onclick="window.location='${l.link}'">
${l.icon}
<h4>${l.title}</h4>
</div>`;
});
document.querySelector(".quick-container").innerHTML=html;
});

/* ===== CHAMPIONS ===== */
fetch(`https://opensheet.elk.sh/${sheetID}/CHAMPIONS`)
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(c=>{
html+=`
<div class="champ">
<img src="${c.image}">
<h4>${c.title}</h4>
<p>${c.subtitle}</p>
</div>`;
});
document.querySelector(".champ-container").innerHTML=html;
});

/* ===== SOCIAL ===== */
fetch(`https://opensheet.elk.sh/${sheetID}/SOCIAL`)
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach(s=>{
html+=`<a href="${s.link}" target="_blank">${s.name}</a>`;
});
document.querySelector(".social").innerHTML+=html;
});

</script>

</body>
</html>
