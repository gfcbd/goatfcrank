<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:radial-gradient(circle at top,#020617,#0f172a);
color:white;
overflow-x:hidden;
}

/* ===== NAVBAR ===== */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:rgba(15,23,42,0.8);
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:45px;
filter:drop-shadow(0 0 10px #7c3aed);
}

.logo span{
font-weight:700;
font-size:22px;
text-shadow:0 0 15px #8b5cf6;
}

.nav-links a{
margin:10px;
color:#cbd5f5;
text-decoration:none;
transition:.3s;
}

.nav-links a:hover{
color:#a78bfa;
text-shadow:0 0 10px #a78bfa;
}

/* ===== HERO SLIDER ===== */
.hero{
position:relative;
height:320px;
overflow:hidden;
}

.ad-box{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:all 1s ease;
}

.ad-box.active{
opacity:1;
transform:scale(1.05);
}

.ad-box img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.5);
}

.ad-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.glow{
text-shadow:0 0 10px #8b5cf6,0 0 30px #7c3aed;
}

.btn{
margin-top:10px;
padding:10px 25px;
background:linear-gradient(45deg,#7c3aed,#ec4899);
border-radius:30px;
color:white;
text-decoration:none;
}

/* ===== SECTION ===== */
.section{
text-align:center;
padding:40px 10px;
}

.section h2{
margin-bottom:20px;
text-shadow:0 0 15px #8b5cf6;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
max-width:900px;
margin:auto;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
transition:.3s;
cursor:pointer;
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,rgba(139,92,246,0.3),transparent);
opacity:0;
transition:.3s;
}

.card:hover::before{
opacity:1;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 25px #8b5cf6;
}

/* ===== CHAMP ===== */
.champ img{
width:100%;
border-radius:10px;
margin-bottom:8px;
}

/* ===== DESC ===== */
.desc{
max-width:700px;
margin:20px auto;
color:#cbd5f5;
font-size:14px;
}

/* ===== SOCIAL ===== */
.social a{
display:inline-block;
margin:5px;
padding:10px 15px;
background:linear-gradient(45deg,#06b6d4,#3b82f6);
border-radius:8px;
text-decoration:none;
color:white;
transition:.3s;
}

.social a:hover{
transform:scale(1.1);
box-shadow:0 0 15px #06b6d4;
}

/* ===== MOBILE ===== */
@media(max-width:600px){
.hero{height:230px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">
<img src="https://i.imgur.com/LY3Bb9m.png">
<span>GOAT FC</span>
</div>

<div class="nav-links">
<a href="#">Rules</a>
<a href="#">About</a>
<a href="#">Contact</a>
<a href="#">Login</a>
</div>
</div>

<!-- HERO -->
<div class="hero"></div>

<!-- QUICK -->
<div class="section">
<h2>CLUB • ELITE • TOURNAMENT</h2>
<div class="grid quick-container"></div>
</div>

<!-- CHAMPIONS -->
<div class="section">
<h2>CHAMPIONS</h2>
<div class="grid champ-container"></div>

<div class="desc">
🏆 Legends are not born — they are made through victory.  
Every champion here represents the highest level of skill and dedication.  
Will you be the next name on this wall?
</div>
</div>

<!-- SOCIAL -->
<div class="section social">
<h2>JOIN COMMUNITY</h2>
</div>

<script>

const sheetID="1ZoXNHa5sYiP_HaPRyL5RDML7l3kC2IaGuQCAmYkERf8";

/* ===== ADS ===== */
let current=0;
let ads=[];

fetch(`https://opensheet.elk.sh/${sheetID}/ADS`)
.then(res=>res.json())
.then(data=>{
ads=data;
renderAds();
});

function renderAds(){
let hero=document.querySelector(".hero");
hero.innerHTML=ads.map((ad,i)=>`
<div class="ad-box ${i==0?'active':''}">
<img src="${ad.image}">
<div class="ad-content">
<h1 class="glow">${ad.title}</h1>
<p>${ad.desc}</p>
<a href="${ad.link}" class="btn">${ad.button}</a>
</div>
</div>`).join("");

startSlider();
addDrag();
}

/* AUTO SLIDE */
function startSlider(){
setInterval(()=>{
changeSlide(1);
},6500);
}

/* CHANGE */
function changeSlide(dir){
let boxes=document.querySelectorAll(".ad-box");
boxes[current].classList.remove("active");
current=(current+dir+boxes.length)%boxes.length;
boxes[current].classList.add("active");
}

/* DRAG CONTROL */
function addDrag(){
let startX=0;

document.querySelector(".hero").addEventListener("mousedown",(e)=>{
startX=e.clientX;
});

document.querySelector(".hero").addEventListener("mouseup",(e)=>{
let diff=e.clientX-startX;
if(diff>50) changeSlide(-1);
if(diff<-50) changeSlide(1);
});

/* MOBILE TOUCH */
document.querySelector(".hero").addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
});

document.querySelector(".hero").addEventListener("touchend",(e)=>{
let diff=e.changedTouches[0].clientX-startX;
if(diff>50) changeSlide(-1);
if(diff<-50) changeSlide(1);
});
}

/* LINKS */
fetch(`https://opensheet.elk.sh/${sheetID}/LINKS`)
.then(res=>res.json())
.then(data=>{
document.querySelector(".quick-container").innerHTML=
data.map(l=>`
<div class="card" onclick="window.location='${l.link}'">
<h3>${l.icon}</h3>
<p>${l.title}</p>
</div>`).join("");
});

/* CHAMPIONS */
fetch(`https://opensheet.elk.sh/${sheetID}/CHAMPIONS`)
.then(res=>res.json())
.then(data=>{
document.querySelector(".champ-container").innerHTML=
data.map(c=>`
<div class="card champ">
<img src="${c.image}">
<h4>${c.title}</h4>
<p>${c.subtitle}</p>
</div>`).join("");
});

/* SOCIAL */
fetch(`https://opensheet.elk.sh/${sheetID}/SOCIAL`)
.then(res=>res.json())
.then(data=>{
document.querySelector(".social").innerHTML+=
data.map(s=>`<a href="${s.link}" target="_blank">${s.name}</a>`).join("");
});

</script>

</body>
</html>
