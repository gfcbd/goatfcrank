<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:radial-gradient(circle at top,#020617,#0f172a);
color:white;
overflow-x:hidden;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
flex-wrap:wrap;
background:rgba(15,23,42,0.85);
backdrop-filter:blur(10px);
}

.logo{
display:flex;
align-items:center;
gap:8px;
min-width:160px;
}

.logo img{
height:38px;
filter:drop-shadow(0 0 10px #7c3aed);
}

.logo span{
font-size:16px;
font-weight:700;
white-space:nowrap;
}

.nav-links{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
}

.nav-links a{
font-size:12px;
padding:6px 8px;
color:#cbd5f5;
text-decoration:none;
white-space:nowrap;
}

.nav-links a:hover{
color:#a78bfa;
text-shadow:0 0 10px #a78bfa;
}

.hero{
position:relative;
height:240px;
overflow:hidden;
}

.ad-box{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:all 0.8s ease;
}

.ad-box.active{
opacity:1;
}

.ad-box img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.45);
}

.ad-content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

.ad-content h1{
font-size:18px;
margin:4px 0;
text-shadow:0 0 10px #8b5cf6;
}

.ad-content p{
font-size:12px;
margin:5px 0;
color:#cbd5f5;
}

.btn{
display:inline-block;
margin-top:6px;
padding:7px 16px;
font-size:12px;
background:linear-gradient(45deg,#7c3aed,#ec4899);
border-radius:25px;
text-decoration:none;
color:white;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
border:none;
color:white;
font-size:18px;
padding:6px 10px;
cursor:pointer;
z-index:10;
border-radius:50%;
}

.arrow.left{left:8px;}
.arrow.right{right:8px;}

.section{
text-align:center;
padding:25px 10px;
}

.section h2{
margin-bottom:15px;
font-size:16px;
}

.glow{
color:#a78bfa;
text-shadow:0 0 10px #7c3aed;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:0 10px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:12px;
transition:.3s;
cursor:pointer;
text-align:center;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #8b5cf6;
}

.card h3,.card h4,.card p{
margin:4px 0;
text-align:center;
}

.champ img{
width:100%;
border-radius:10px;
}

/* ===== UPDATED WINNERS ZONE (SMALL + TIGHT) ===== */
.champ h4{
font-size:11px;
margin:3px 0 2px 0;
}

.champ p{
font-size:10px;
margin:0;
line-height:1.2;
color:#cbd5f5;
}

.desc{
max-width:700px;
margin:10px auto;
font-size:12px;
color:#cbd5f5;
line-height:1.5;
}

.social a{
display:inline-block;
margin:5px;
padding:8px 12px;
font-size:12px;
background:linear-gradient(45deg,#06b6d4,#3b82f6);
border-radius:8px;
color:white;
text-decoration:none;
}

@media(max-width:600px){
.hero{height:200px;}
.logo span{font-size:14px;}
.nav-links a{font-size:11px;padding:5px;}
.ad-content h1{font-size:15px;}
.ad-content p{font-size:11px;}
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">
<img src="https://i.imgur.com/LY3Bb9m.png">
<span>GOAT FC</span>
</div>

<div class="nav-links">
<a href="https://docs.google.com/document/d/1T7p7AjuFfk-DtVbJgdGFcwsH0ipDfG3wg05qv8Y0fJ4/edit?usp=sharing">Rules</a>
<a href="https://www.facebook.com/groups/goatfc.official">About</a>
<a href="https://www.facebook.com/goatfc.official">Contact</a>
<a href="https://forms.gle/HnRQHSFgwpQXc81F9">Registration</a>
</div>

</div>

<div class="hero">
<button class="arrow left" onclick="changeSlide(-1)">‹</button>
<button class="arrow right" onclick="changeSlide(1)">›</button>
</div>

<div class="section">
<h2 class="glow">⭐CLUB HUB⭐</h2>
<div class="grid quick-container"></div>
</div>

<div class="section" style="margin-top:-10px;">
<h2 class="glow">🔥Hall of Champions🔥</h2>

<div class="grid champ-container"></div>

<div class="desc">
🏆 This zone represents champions, top scorers, and elite performers of Goat FC. Every card here tells a story of dominance, skill, and consistency.
</div>
</div>

<div class="section social">
<h2 class="glow">JOIN WITH US</h2>
</div>

<script>

const sheetID="1ZoXNHa5sYiP_HaPRyL5RDML7l3kC2IaGuQCAmYkERf8";

let ads=[];
let current=0;

fetch(`https://opensheet.elk.sh/${sheetID}/ADS`)
.then(r=>r.json())
.then(data=>{
ads=data;
renderAds();
startAuto();
});

function renderAds(){
let hero=document.querySelector(".hero");

hero.innerHTML+=ads.map((ad,i)=>`
<div class="ad-box ${i==0?'active':''}">
<img src="${ad.image}">
<div class="ad-content">
<h1>${ad.title}</h1>
<p>${ad.desc}</p>
<a class="btn" href="${ad.link}">${ad.button}</a>
</div>
</div>
`).join("");
}

function startAuto(){
setInterval(()=>changeSlide(1),7000);
}

function changeSlide(dir){
let boxes=document.querySelectorAll(".ad-box");
boxes[current].classList.remove("active");

current=(current+dir+boxes.length)%boxes.length;

boxes[current].classList.add("active");
}

fetch(`https://opensheet.elk.sh/${sheetID}/LINKS`)
.then(r=>r.json())
.then(data=>{
document.querySelector(".quick-container").innerHTML=
data.map(l=>`
<div class="card" onclick="window.location='${l.link}'">
<h3>${l.icon}</h3>
<h4>${l.title}</h4>
</div>
`).join("");
});

fetch(`https://opensheet.elk.sh/${sheetID}/CHAMPIONS`)
.then(r=>r.json())
.then(data=>{
document.querySelector(".champ-container").innerHTML=
data.map(c=>`
<div class="card champ">
<img src="${c.image}">
<h4>${c.title}</h4>
<p>${c.subtitle}</p>
</div>
`).join("");
});

fetch(`https://opensheet.elk.sh/${sheetID}/SOCIAL`)
.then(r=>r.json())
.then(data=>{
document.querySelector(".social").innerHTML+=
data.map(s=>`
<a href="${s.link}" target="_blank">${s.name}</a>
`).join("");
});

</script>

</body>
</html>
